name: Publish to PyPI

# Fires when a Release is published on GitHub.
#
# Release flow:
#   1. Bump `version` in pyproject.toml and `__version__` in
#      src/outskilled/__init__.py to the new version (e.g., 0.2.1).
#   2. Commit and merge to main.
#   3. On GitHub, Releases -> Draft a new release -> tag `v0.2.1` ->
#      Publish. This workflow runs and uploads sdist+wheel to PyPI.
#
# Auth: trusted publishing via OIDC, no API token. Configure the
# trusted publisher on PyPI once:
#
#   PyPI -> your project -> Publishing -> Add a new publisher
#     Owner:               phiweger
#     Repository:          outskilled
#     Workflow filename:   publish.yml
#     Environment name:    pypi
#
# Until that's configured the publish step will fail with a clear
# error from PyPI.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "Release tag v$tag does not match pyproject.toml version $pkg" >&2
            exit 1
          fi

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Install package with dev extras (for tests)
        run: python -m pip install -e ".[pydantic-ai,dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/outskilled
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
